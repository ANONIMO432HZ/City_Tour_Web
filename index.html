<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuantaStatus | Estado de Zonas Turísticas</title>
    <meta name="description" content="Consulta el estado en tiempo real de las cataratas, santuarios y miradores de Huanta, Ayacucho. Vive 'La Esmeralda de los Andes'." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 selection:bg-blue-500/30">
    <div id="app" class="w-full flex flex-col">
      <!-- El contenido se cargará dinámicamente -->
    </div>
    
    <!-- Modal para ver imágenes en tamaño grande -->
    <div id="image-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4 md:p-10 cursor-zoom-out overflow-hidden">
        <!-- Close Button -->
        <button id="close-modal" class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors p-2 bg-white/5 rounded-full z-[110]">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <!-- Navigation Arrows -->
        <button id="prev-btn" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 p-3 bg-white/5 border border-white/10 rounded-full text-white/50 hover:text-white hover:bg-white/10 transition-all z-[110] focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
            <i data-lucide="chevron-left" class="w-8 h-8"></i>
        </button>
        
        <button id="next-btn" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 p-3 bg-white/5 border border-white/10 rounded-full text-white/50 hover:text-white hover:bg-white/10 transition-all z-[110] focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
            <i data-lucide="chevron-right" class="w-8 h-8"></i>
        </button>

        <div class="relative max-w-5xl w-full h-full flex flex-col items-center justify-center pointer-events-none">
            <img id="modal-img" src="" alt="" class="max-w-full max-h-[75vh] object-contain rounded-2xl shadow-2xl pointer-events-auto shadow-emerald-500/10 border border-white/5" />
            <div id="modal-caption" class="mt-8 text-center bg-slate-900/40 p-6 rounded-3xl backdrop-blur-md border border-white/5 pointer-events-auto max-w-2xl">
                <span id="modal-category" class="text-[10px] text-emerald-500 font-black uppercase tracking-[0.2em] mb-2 block"></span>
                <h3 id="modal-title" class="text-2xl font-bold text-white mb-3"></h3>
                <p id="modal-desc" class="text-slate-400 text-sm leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
