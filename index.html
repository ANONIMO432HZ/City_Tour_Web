<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuantaStatus | Estado de Zonas Turísticas</title>
    <meta name="description" content="Consulta el estado en tiempo real de las cataratas, santuarios y miradores de Huanta, Ayacucho. Vive 'La Esmeralda de los Andes'." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 selection:bg-blue-500/30">
    <div id="app" class="w-full flex flex-col">
      <!-- El contenido se cargará dinámicamente -->
    </div>
    
    <!-- Modal para ver imágenes en tamaño grande -->
    <div id="image-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4 md:p-10 cursor-zoom-out overflow-hidden">
        <button id="close-modal" class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors p-2 bg-white/5 rounded-full z-[110]">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div class="relative max-w-5xl w-full h-full flex flex-col items-center justify-center pointer-events-none">
            <img id="modal-img" src="" alt="" class="max-w-full max-h-[80vh] object-contain rounded-2xl shadow-2xl pointer-events-auto shadow-emerald-500/10 border border-white/5" />
            <div id="modal-caption" class="mt-6 text-center">
                <h3 id="modal-title" class="text-2xl font-bold text-white mb-2"></h3>
                <p id="modal-desc" class="text-slate-400 text-sm"></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
